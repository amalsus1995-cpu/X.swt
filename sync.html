<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x.swt - إدخال الكود</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="supabase.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Tahoma;
background:linear-gradient(180deg,#f8f9fb,#edf1f5);
}

.app{
max-width:430px;
margin:auto;
padding:14px 14px 90px;
}

.card{
background:#fff;
border-radius:22px;
padding:16px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
margin-bottom:14px;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.muted{
font-size:13px;
color:#666;
line-height:1.7;
}

.input{
width:100%;
padding:16px;
border-radius:16px;
border:1px solid #ddd;
font-size:16px;
margin-top:10px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
background:#111;
color:#fff;
}

.info{
margin-top:10px;
font-size:14px;
}

.bottom-nav{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:10px;
width:min(430px, calc(100% - 20px));
background:#fff;
border-radius:24px;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 16px 35px rgba(0,0,0,.12);
}

.nav-item{
font-size:12px;
text-decoration:none;
color:#666;
}
</style>
</head>

<body>

<div class="app">

<div class="card">

<div class="title">إدخال كود اليوم</div>

<div class="muted">
أدخل الكود الذي يتم إرساله يومياً لزيادة الأرباح.
</div>

<input id="codeInput" class="input" placeholder="اكتب الكود هنا">

<button class="btn" onclick="submitCode()">
تأكيد الكود
</button>

<div class="info" id="resultBox"></div>

</div>

</div>

<div class="bottom-nav">
<a href="index.html" class="nav-item">الرئيسية</a>
<a href="market.html" class="nav-item">السوق</a>
<a href="sync.html" class="nav-item">الكود</a>
<a href="assets.html" class="nav-item">الأصول</a>
<a href="team.html" class="nav-item">الفريق</a>
</div>

<script>

async function submitCode(){

const user = await ensureLoggedIn()
if(!user) return

const code = document.getElementById("codeInput").value.trim().toUpperCase()

if(!code){
alert("اكتب الكود")
return
}

const today = new Date().toISOString().slice(0,10)

const { data } = await supabaseClient
.from("daily_codes")
.select("*")
.eq("code",code)
.eq("day_key",today)
.eq("is_active",true)
.single()

if(!data){
document.getElementById("resultBox").innerText="الكود غير صحيح"
return
}

const wallet = await getMyWallet()

const profit = Math.floor((wallet.balance_points || 0) / 15)

if(profit<=0){
document.getElementById("resultBox").innerText="لا يوجد رصيد كافي للربح"
return
}

const newEarn = (wallet.earned_points || 0) + profit
const newBalance = (wallet.balance_points || 0) + profit

await supabaseClient
.from("wallets")
.update({
earned_points:newEarn,
balance_points:newBalance
})
.eq("user_id",user.id)

await supabaseClient
.from("activity_feed")
.insert({
user_id:user.id,
display_text:`ربحت ${profit} نقطة من كود اليوم`
})

document.getElementById("resultBox").innerText=`تم إضافة ${profit} نقطة`
}

</script>

</body>
</html>
