<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x.swt - تسجيل الدخول</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#f8f9fb,#edf1f5);
      color:#222;
      min-height:100vh;
    }
    .wrap{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 14px;
    }
    .card{
      width:100%;
      background:rgba(255,255,255,.96);
      border:1px solid #e6e6e6;
      border-radius:28px;
      padding:26px 18px;
      box-shadow:0 16px 35px rgba(0,0,0,.08);
    }
    .brand{
      text-align:center;
      margin-bottom:20px;
    }
    .brand img{
      width:72px;
      height:72px;
      object-fit:cover;
      border-radius:20px;
      background:#fff;
      box-shadow:0 8px 20px rgba(0,0,0,.10);
    }
    .brand h1{
      margin:10px 0 6px;
      font-size:22px;
    }
    .brand p{
      margin:0;
      color:#777;
      font-size:14px;
    }
    .field{
      margin-bottom:14px;
    }
    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:bold;
    }
    input{
      width:100%;
      padding:15px;
      border:1px solid #d6dae1;
      border-radius:16px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    input:focus{
      border-color:#aeb6c3;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,#eef2f6,#ffffff);
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      margin-top:4px;
    }
    .msg{
      margin-top:14px;
      border-radius:16px;
      padding:14px;
      font-size:15px;
      display:none;
      line-height:1.7;
    }
    .msg.ok{
      display:block;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .msg.err{
      display:block;
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
    }
    .links{
      text-align:center;
      margin-top:18px;
      font-size:15px;
      line-height:2;
    }
    .links a{
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="brand">
        <img src="logo.png" alt="x.swt logo">
        <h1>x.swt</h1>
        <p>تسجيل الدخول إلى المنصة</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>البريد الإلكتروني</label>
          <input id="email" type="email" placeholder="name@example.com" required>
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input id="password" type="password" placeholder="********" required>
        </div>

        <button class="btn" type="submit">دخول</button>
      </form>

      <div id="msgBox" class="msg"></div>

      <div class="links">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a><br>
        <a href="#" id="forgotBtn">نسيت كلمة المرور؟</a>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msgBox = document.getElementById("msgBox");
    const forgotBtn = document.getElementById("forgotBtn");

    function showMsg(text, type){
      msgBox.className = "msg " + type;
      msgBox.textContent = text;
    }

    form.addEventListener("submit", async function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      msgBox.className = "msg";
      msgBox.textContent = "";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if(error){
        showMsg("فشل تسجيل الدخول: " + error.message, "err");
        return;
      }

      showMsg("تم تسجيل الدخول بنجاح", "ok");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    });

    forgotBtn.addEventListener("click", async function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();

      if(!email){
        showMsg("اكتب بريدك الإلكتروني أولاً ثم اضغط نسيت كلمة المرور", "err");
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/login.html"
      });

      if(error){
        showMsg("تعذر إرسال رابط إعادة التعيين: " + error.message, "err");
        return;
      }

      showMsg("تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني", "ok");
    });
  </script>
</body>
</html>
