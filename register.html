<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x.swt - إنشاء حساب</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#f8f9fb,#edf1f5);
      color:#222;
      min-height:100vh;
    }
    .wrap{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 14px;
    }
    .card{
      width:100%;
      background:rgba(255,255,255,.96);
      border:1px solid #e6e6e6;
      border-radius:28px;
      padding:26px 18px;
      box-shadow:0 16px 35px rgba(0,0,0,.08);
    }
    .brand{
      text-align:center;
      margin-bottom:20px;
    }
    .brand img{
      width:72px;
      height:72px;
      object-fit:cover;
      border-radius:20px;
      background:#fff;
      box-shadow:0 8px 20px rgba(0,0,0,.10);
    }
    .brand h1{
      margin:10px 0 6px;
      font-size:22px;
    }
    .brand p{
      margin:0;
      color:#777;
      font-size:14px;
    }
    .field{
      margin-bottom:14px;
    }
    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      font-weight:bold;
    }
    input{
      width:100%;
      padding:15px;
      border:1px solid #d6dae1;
      border-radius:16px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    input:focus{
      border-color:#aeb6c3;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,#eef2f6,#ffffff);
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      margin-top:4px;
    }
    .msg{
      margin-top:14px;
      border-radius:16px;
      padding:14px;
      font-size:15px;
      display:none;
      line-height:1.7;
    }
    .msg.ok{
      display:block;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .msg.err{
      display:block;
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
    }
    .links{
      text-align:center;
      margin-top:18px;
      font-size:15px;
    }
    .links a{
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
    }
    .small{
      text-align:center;
      margin-top:12px;
      color:#888;
      font-size:13px;
      line-height:1.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="brand">
        <img src="logo.png" alt="x.swt logo">
        <h1>x.swt</h1>
        <p>إنشاء حساب جديد</p>
      </div>

      <form id="registerForm">
        <div class="field">
          <label>الاسم الكامل</label>
          <input id="fullName" type="text" placeholder="اكتب اسمك الكامل" required>
        </div>

        <div class="field">
          <label>البريد الإلكتروني</label>
          <input id="email" type="email" placeholder="name@example.com" required>
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input id="password" type="password" placeholder="********" required>
        </div>

        <div class="field">
          <label>كود الدعوة (اختياري)</label>
          <input id="refCode" type="text" placeholder="كود الدعوة">
        </div>

        <button class="btn" type="submit">إنشاء الحساب</button>
      </form>

      <div id="msgBox" class="msg"></div>

      <div class="small">
        بعد إنشاء الحساب يمكنك تسجيل الدخول مباشرة.
      </div>

      <div class="links">
        لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const msgBox = document.getElementById("msgBox");

    function showMsg(text, type){
      msgBox.className = "msg " + type;
      msgBox.textContent = text;
    }

    form.addEventListener("submit", async function(e){
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const refCode = document.getElementById("refCode").value.trim().toUpperCase();

      msgBox.className = "msg";
      msgBox.textContent = "";

      if(!fullName || !email || !password){
        showMsg("يرجى تعبئة جميع الحقول المطلوبة", "err");
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName
          }
        }
      });

      if(error){
        showMsg(error.message, "err");
        return;
      }

      const user = data?.user;
      if(!user){
        showMsg("تعذر إنشاء الحساب", "err");
        return;
      }

      const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
      await wait(1200);

      if(refCode){
        const { data: refOwner } = await supabaseClient
          .from("profiles")
          .select("id, referral_code")
          .eq("referral_code", refCode)
          .single();

        if(refOwner){
          await supabaseClient
            .from("referrals")
            .upsert({
              referrer_id: refOwner.id,
              referred_id: user.id
            }, { onConflict: "referred_id" });
        }
      }

      showMsg("تم إنشاء الحساب بنجاح، سيتم تحويلك إلى تسجيل الدخول.", "ok");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    });
  </script>
</body>
</html>
